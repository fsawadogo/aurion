name: iOS — TestFlight

# Two jobs:
#   • build      — runs on every PR + every push to main. Compiles +
#                  tests on the iPhone 17 + iPad Pro simulators. This
#                  is the green-check gate on PRs.
#   • testflight — runs on every push to main + manual dispatch.
#                  Archives, signs Distribution, uploads via altool,
#                  distributes to the external "Pilot Physicians" group
#                  via fastlane (internal team members auto-receive
#                  whenever Apple processing flips to VALID).
#
# Why testflight auto-runs on main: pre-2026-06-06 it was
# workflow_dispatch-only with the rationale "Apple's daily build-upload
# quota (error 90382)." In practice that quota is ~90 builds/day per
# app — orders of magnitude above pilot cadence — and the manual gate
# silently dropped fixes onto the floor between dispatches. The Marie
# bug-bash on 2026-06-05 shipped six iOS PRs to main while Marie's
# TestFlight stayed on a 7-hour-old build, with no one realising
# until the bug bash was done.
#
# Gated on the App Store Connect API key secret being present (the
# `gate` step in the testflight job). Until the Apple Developer Program
# membership processes (~48h) and you've generated the key, the upload
# step is skipped automatically.

on:
  push:
    branches: [main]
    paths:
      - "ios/**"
      - ".github/workflows/ios-testflight.yml"
  pull_request:
    branches: [main]
    paths:
      - "ios/**"
      # Include this workflow file itself in the PR-time path filter so
      # changes to the workflow (e.g. P1-5-FU adding the codec-isolated
      # test step) self-validate on the PR that introduces them, instead
      # of only running after merge to main.
      - ".github/workflows/ios-testflight.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  IOS_PROJECT_DIR: ios/Aurion
  IOS_SCHEME: Aurion
  # Promoted to a workflow-level env var so the build job's three xcodebuild
  # invocations (compile, main test, codec-isolated test) all reference the
  # same simulator destination — change here, propagate everywhere (DRY §6c).
  IOS_SIM_DESTINATION: platform=iOS Simulator,name=iPhone 17

jobs:
  build:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
        with:
          # Need history to synthesize the TestFlight "What to Test"
          # changelog from recent `feat:`/`fix:` commit headlines (see
          # fastlane/Fastfile build_changelog_from_git). Default depth
          # of 1 would leave the helper at the static-fallback path.
          fetch-depth: 0

      - name: Select Xcode (newest installed)
        # Aurion's pbxproj uses IPHONEOS_DEPLOYMENT_TARGET = 26.0 + APIs
        # like AVAudioSession.allowBluetoothHFP that require Xcode 26+.
        # Pick the highest-numbered Xcode in /Applications rather than
        # pin to an exact patch version — runner image bumps don't break us.
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)/Contents/Developer" && xcodebuild -version

      # Build for the simulator on every event — proves the project
      # compiles. Same target as the local dev check.
      - name: Build for iPhone 17 Simulator
        working-directory: ${{ env.IOS_PROJECT_DIR }}
        run: |
          xcodebuild -scheme "$IOS_SCHEME" \
                     -destination "$IOS_SIM_DESTINATION" \
                     -configuration Debug \
                     build | xcpretty || true

      # Run the unit test suite (Swift Testing + XCTest in `AurionTests`).
      # The codec-sensitive `MaskClipTests/happyPath_producesAudioFreeMP4WithFrames`
      # is gated behind AURION_RUN_CLIP_HAPPY_PATH=1 (P1-5) — the env var
      # is intentionally NOT set here so the simulator's H.264 codec
      # allocator (Fig err=-12900) isn't tripped by the full-suite run.
      # The gated test runs in its own xcodebuild invocation below so a
      # codec-pool flake there can't take down the main test signal.
      - name: Run AurionTests
        working-directory: ${{ env.IOS_PROJECT_DIR }}
        # set -o pipefail so a failing xcodebuild propagates through the
        # xcpretty pipe and fails the step. xcpretty is preinstalled on
        # macos-26 runners (same pattern as the Build step above).
        run: |
          set -o pipefail
          xcodebuild test \
                     -scheme "$IOS_SCHEME" \
                     -destination "$IOS_SIM_DESTINATION" \
                     -only-testing:AurionTests \
                     -configuration Debug | xcpretty --test --color

      # Codec-exhaustion-sensitive happy-path test for MaskingPipeline.maskClip.
      # Gated behind TEST_RUNNER_AURION_RUN_CLIP_HAPPY_PATH=1 because running
      # it alongside other AV-heavy tests in a single xcodebuild invocation
      # exhausts the simulator's process-scoped H.264 codec slot pool
      # (kCMSampleBufferError_AllocationFailed / Fig err=-12900). Each
      # xcodebuild test invocation gets a fresh simulator boot + fresh codec
      # pool, so running THIS test in its own invocation sidesteps the
      # cross-test resource collision.
      #
      # Filter is struct-level (AurionTests/MaskClipTests) — Swift Testing
      # does NOT support method-level -only-testing: paths; the additional
      # smoke test (mask_polymorphicEntry_routesClipToMaskClip_andFailsClosed)
      # is cheap (~0.1s) and DOES NOT exercise the codec, so including it
      # in the filter is harmless.
      #
      # TEST_RUNNER_<VAR> is the xcodebuild-documented mechanism for
      # propagating an env var into the simulator's test runner process
      # (man xcodebuild → "Environment Variables"). A bare prefix would
      # only set the variable on the xcodebuild parent and the runner
      # subprocess would not inherit it.
      #
      # continue-on-error: true so an intermittent simulator codec flake
      # CANNOT block the PR — the main test step above is the gate. If this
      # step turns out to flake repeatedly we'll investigate, but the
      # default posture for this single canary test is "best-effort signal".
      - name: Run codec-exhaustion-sensitive tests (isolated)
        if: always()
        continue-on-error: true
        working-directory: ${{ env.IOS_PROJECT_DIR }}
        env:
          TEST_RUNNER_AURION_RUN_CLIP_HAPPY_PATH: "1"
        run: |
          set -o pipefail
          xcodebuild test \
                     -scheme "$IOS_SCHEME" \
                     -destination "$IOS_SIM_DESTINATION" \
                     -only-testing:AurionTests/MaskClipTests \
                     -configuration Debug | xcpretty --test --color

  testflight:
    # Auto-dispatches on every push to main + remains manually triggerable
    # via workflow_dispatch. Pre-policy this job ran on workflow_dispatch
    # ONLY, the rationale being Apple's daily upload quota (error 90382).
    # In practice the quota is ~90 builds/day per app — orders of magnitude
    # above any realistic pilot-period cadence — and the manual gate kept
    # silently dropping fixes onto the floor between dispatches. On
    # 2026-06-05 the Marie bug-bash shipped six iOS PRs to main while
    # Marie's TestFlight stayed on a 7-hour-old build, with no one
    # realising until the bug bash was done.
    #
    # Policy now: any push to main with iOS path changes → automatic
    # TestFlight upload + distribution. Still gated on the App Store
    # Connect API key secret (the `gate` step below) so a missing secret
    # is a graceful no-op rather than a hard CI failure.
    runs-on: macos-26
    needs: build
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    env:
      APP_STORE_CONNECT_KEY_ID:    ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      APP_STORE_CONNECT_KEY_P8:    ${{ secrets.APP_STORE_CONNECT_KEY_P8 }}
      APPLE_DIST_CERT_P12:         ${{ secrets.APPLE_DIST_CERT_P12 }}
      APPLE_DIST_CERT_PASSWORD:    ${{ secrets.APPLE_DIST_CERT_PASSWORD }}
      # MWDAT client identifiers (Meta Wearables, #442). Baked into the
      # archived build's MWDAT Info.plist dict via $(MWDAT_*) build settings.
      # Unset ⇒ empty ⇒ the SDK stays dark (Wearables.configure() ignored) —
      # and Developer Mode needs no creds anyway. Set these only for an
      # attestation build, alongside flipping meta_wearables_enabled.
      MWDAT_META_APP_ID:           ${{ secrets.MWDAT_META_APP_ID }}
      MWDAT_CLIENT_TOKEN:          ${{ secrets.MWDAT_CLIENT_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Skip if Apple Dev account not yet wired
        id: gate
        run: |
          if [ -z "$APP_STORE_CONNECT_KEY_ID" ] || \
             [ -z "$APP_STORE_CONNECT_ISSUER_ID" ] || \
             [ -z "$APP_STORE_CONNECT_KEY_P8" ]; then
            echo "::notice::App Store Connect secrets not set — skipping TestFlight upload."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Select Xcode (newest installed)
        if: steps.gate.outputs.skip == 'false'
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)/Contents/Developer" && xcodebuild -version

      - name: Materialize App Store Connect API key
        if: steps.gate.outputs.skip == 'false'
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          # The secret is the base64-encoded contents of the .p8 file
          # to avoid newline mangling in the GitHub secret store.
          echo "$APP_STORE_CONNECT_KEY_P8" | base64 --decode \
            > "$HOME/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8"

      # Without this step, xcodebuild's export step produces a Development-
      # signed .ipa (because -allowProvisioningUpdates only creates Development
      # certs). altool then rejects the upload with 90035 "Invalid Signature".
      # Importing the Apple Distribution cert + private key into a dedicated
      # build-only keychain lets codesign find the Distribution identity and
      # actually re-sign the export to Distribution.
      - name: Import Apple Distribution cert into a temp keychain
        if: steps.gate.outputs.skip == 'false'
        run: |
          KEYCHAIN="$RUNNER_TEMP/aurion-build.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"

          # Create + unlock a clean keychain for this run.
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"

          # Add the new keychain to the user search list ahead of login.keychain.
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          security default-keychain -s "$KEYCHAIN"

          # Decode + import the Distribution cert + private key.
          echo "$APPLE_DIST_CERT_P12" | base64 --decode > "$RUNNER_TEMP/dist.p12"
          security import "$RUNNER_TEMP/dist.p12" \
            -k "$KEYCHAIN" \
            -P "$APPLE_DIST_CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -T /usr/bin/productbuild
          rm "$RUNNER_TEMP/dist.p12"

          # Authorize codesign to use the imported key without prompting.
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"

          # Sanity check: confirm the Distribution identity is visible.
          security find-identity -v -p codesigning "$KEYCHAIN"

      # `xcodebuild -allowProvisioningUpdates` uses the API key to
      # auto-fetch / refresh signing certs + provisioning profiles —
      # no manual cert + profile management in CI.
      - name: Archive
        if: steps.gate.outputs.skip == 'false'
        working-directory: ${{ env.IOS_PROJECT_DIR }}
        # Raw xcodebuild output (no `xcpretty || true`) — when archive fails
        # we need the real signing / provisioning error, not a swallowed exit.
        # CODE_SIGN_IDENTITY[sdk=iphoneos*]="Apple Distribution" is baked
        # into the Release configs of the xcodeproj for both targets, so
        # the CLI doesn't need to override it.
        #
        # CURRENT_PROJECT_VERSION (CFBundleVersion) is overridden to the
        # GitHub Actions run number — monotonically increasing per workflow
        # invocation, so every push to main produces a unique TestFlight
        # build number. Without this override, the pbxproj-baked value
        # (`= 1`) made every upload after the first one a duplicate, and
        # Apple's processing pipeline silently rejected them after
        # altool's UPLOAD SUCCEEDED — fixing required physicians can't
        # receive new bug-fix builds in TestFlight.
        run: |
          set -o pipefail
          xcodebuild -scheme "$IOS_SCHEME" \
                     -destination 'generic/platform=iOS' \
                     -configuration Release \
                     -archivePath "$RUNNER_TEMP/Aurion.xcarchive" \
                     -allowProvisioningUpdates \
                     -authenticationKeyPath "$HOME/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8" \
                     -authenticationKeyID "$APP_STORE_CONNECT_KEY_ID" \
                     -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
                     CURRENT_PROJECT_VERSION="${GITHUB_RUN_NUMBER}" \
                     MWDAT_META_APP_ID="${MWDAT_META_APP_ID}" \
                     MWDAT_CLIENT_TOKEN="${MWDAT_CLIENT_TOKEN}" \
                     archive

      - name: Export IPA
        if: steps.gate.outputs.skip == 'false'
        working-directory: ${{ env.IOS_PROJECT_DIR }}
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
                     -archivePath "$RUNNER_TEMP/Aurion.xcarchive" \
                     -exportPath "$RUNNER_TEMP/export" \
                     -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
                     -allowProvisioningUpdates \
                     -authenticationKeyPath "$HOME/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8" \
                     -authenticationKeyID "$APP_STORE_CONNECT_KEY_ID" \
                     -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID"

      - name: Upload to TestFlight
        if: steps.gate.outputs.skip == 'false'
        run: |
          IPA_PATH=$(find "$RUNNER_TEMP/export" -name "*.ipa" -type f | head -1)
          if [ -z "$IPA_PATH" ]; then
            echo "::error::No .ipa produced by export step"
            exit 1
          fi
          xcrun altool --upload-app \
                       --type ios \
                       --file "$IPA_PATH" \
                       --apiKey "$APP_STORE_CONNECT_KEY_ID" \
                       --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID"

      # altool only uploads bytes — it does not assign the build to any
      # tester group. Without this step the build sits in App Store
      # Connect "Ready to Submit" forever and external testers never
      # see it (we shipped builds 5-105 this way; only build 4 ever
      # reached anyone because it was the last one manually assigned to
      # a group). fastlane's `distribute_latest` lane picks the most
      # recently uploaded build, creates the external group on the fly
      # if missing, submits for Beta App Review, and notifies testers.
      # The group name is overridable via TESTFLIGHT_GROUP_NAME below.
      # INTERNAL-ONLY gate (MWDAT / glasses builds). Since #442 every build
      # links the Meta Wearables SDK (ExternalAccessory surface), which Apple
      # may reject for EXTERNAL Beta App Review and which Meta doesn't support
      # for App Store publish until their stated 2026 broad-publish. So while
      # vars.TESTFLIGHT_INTERNAL_ONLY == 'true' we SKIP external distribution
      # entirely — internal App Store Connect team members still auto-receive
      # every processed build (that delivery is driven by the upload step, not
      # this lane). Flip the repo variable to 'false' / unset to resume
      # external "Pilot Physicians" distribution once external review is
      # confirmed to accept the SDK-linked build. (#441)
      - name: Distribute build to external testers
        if: ${{ steps.gate.outputs.skip == 'false' && vars.TESTFLIGHT_INTERNAL_ONLY != 'true' }}
        working-directory: ${{ env.IOS_PROJECT_DIR }}
        env:
          # External tester group (pilot physicians, etc.). Auto-created
          # if missing; build is submitted to Beta App Review on every
          # dispatch. Override via repo Variables.
          TESTFLIGHT_EXTERNAL_GROUP_NAME: ${{ vars.TESTFLIGHT_EXTERNAL_GROUP_NAME || vars.TESTFLIGHT_GROUP_NAME || 'Pilot Physicians' }}
          # CFBundleVersion is overridden to GITHUB_RUN_NUMBER in the
          # Archive step above; pass the same here so the lane knows
          # exactly which build to wait for + distribute (no ambiguity
          # if other builds happen to share the marketing version).
          BUILD_NUMBER: ${{ github.run_number }}
          APP_VERSION: "1.0"
        run: |
          # Apple's processing pipeline takes 5-15min after altool reports
          # SUCCESS; the lane polls until processing_state=VALID then
          # distributes to the external group (submits Beta App Review)
          # and confirms internal team members auto-received the build.
          # 25min processing ceiling.
          fastlane distribute_latest

      # Transparency: when the internal-only gate skips external
      # distribution, say so explicitly in the run log so a skipped
      # external step never reads as a silent failure. Internal team
      # members already received the build via the upload step above.
      - name: Note internal-only distribution
        if: ${{ steps.gate.outputs.skip == 'false' && vars.TESTFLIGHT_INTERNAL_ONLY == 'true' }}
        run: |
          echo "::notice title=Internal-only TestFlight::vars.TESTFLIGHT_INTERNAL_ONLY=true — external 'Pilot Physicians' distribution skipped (MWDAT/ExternalAccessory build, #441). Internal App Store Connect team testers auto-received this build. Unset the variable to resume external distribution."
