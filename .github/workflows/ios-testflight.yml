name: iOS — TestFlight

# Compiles the iOS app on every push to main / PR that touches iOS code
# (the green-check gate). The TestFlight UPLOAD runs ONLY on a manual
# trigger (workflow_dispatch) — NOT on every merge — so a burst of merges
# doesn't blow App Store Connect's daily build-upload quota (error 90382:
# "Upload limit reached. Please wait 1 day").
#
# To ship a build to testers: GitHub → Actions → "iOS — TestFlight" →
# Run workflow, or `gh workflow run "iOS — TestFlight"`. It builds + uploads
# main HEAD, so one dispatch carries every change merged since the last upload.
#
# Gated on the App Store Connect API key secret being present. Until
# the Apple Developer Program membership processes (~48h) and you've
# generated the key, the upload step is skipped automatically.

on:
  push:
    branches: [main]
    paths:
      - "ios/**"
      - ".github/workflows/ios-testflight.yml"
  pull_request:
    branches: [main]
    paths:
      - "ios/**"
  workflow_dispatch:

permissions:
  contents: read

env:
  IOS_PROJECT_DIR: ios/Aurion
  IOS_SCHEME: Aurion

jobs:
  build:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode (newest installed)
        # Aurion's pbxproj uses IPHONEOS_DEPLOYMENT_TARGET = 26.0 + APIs
        # like AVAudioSession.allowBluetoothHFP that require Xcode 26+.
        # Pick the highest-numbered Xcode in /Applications rather than
        # pin to an exact patch version — runner image bumps don't break us.
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)/Contents/Developer" && xcodebuild -version

      # Build for the simulator on every event — proves the project
      # compiles. Same target as the local dev check.
      - name: Build for iPhone 17 Simulator
        working-directory: ${{ env.IOS_PROJECT_DIR }}
        run: |
          xcodebuild -scheme "$IOS_SCHEME" \
                     -destination 'platform=iOS Simulator,name=iPhone 17' \
                     -configuration Debug \
                     build | xcpretty || true

  testflight:
    # Manual-only (workflow_dispatch) so routine merges don't auto-upload
    # and exhaust Apple's daily build-upload limit. Still gated on the App
    # Store Connect API key secret — a graceful no-op until the key is wired.
    runs-on: macos-26
    needs: build
    if: github.event_name == 'workflow_dispatch'
    env:
      APP_STORE_CONNECT_KEY_ID:    ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      APP_STORE_CONNECT_KEY_P8:    ${{ secrets.APP_STORE_CONNECT_KEY_P8 }}
      APPLE_DIST_CERT_P12:         ${{ secrets.APPLE_DIST_CERT_P12 }}
      APPLE_DIST_CERT_PASSWORD:    ${{ secrets.APPLE_DIST_CERT_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Skip if Apple Dev account not yet wired
        id: gate
        run: |
          if [ -z "$APP_STORE_CONNECT_KEY_ID" ] || \
             [ -z "$APP_STORE_CONNECT_ISSUER_ID" ] || \
             [ -z "$APP_STORE_CONNECT_KEY_P8" ]; then
            echo "::notice::App Store Connect secrets not set — skipping TestFlight upload."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Select Xcode (newest installed)
        if: steps.gate.outputs.skip == 'false'
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)/Contents/Developer" && xcodebuild -version

      - name: Materialize App Store Connect API key
        if: steps.gate.outputs.skip == 'false'
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          # The secret is the base64-encoded contents of the .p8 file
          # to avoid newline mangling in the GitHub secret store.
          echo "$APP_STORE_CONNECT_KEY_P8" | base64 --decode \
            > "$HOME/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8"

      # Without this step, xcodebuild's export step produces a Development-
      # signed .ipa (because -allowProvisioningUpdates only creates Development
      # certs). altool then rejects the upload with 90035 "Invalid Signature".
      # Importing the Apple Distribution cert + private key into a dedicated
      # build-only keychain lets codesign find the Distribution identity and
      # actually re-sign the export to Distribution.
      - name: Import Apple Distribution cert into a temp keychain
        if: steps.gate.outputs.skip == 'false'
        run: |
          KEYCHAIN="$RUNNER_TEMP/aurion-build.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"

          # Create + unlock a clean keychain for this run.
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"

          # Add the new keychain to the user search list ahead of login.keychain.
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          security default-keychain -s "$KEYCHAIN"

          # Decode + import the Distribution cert + private key.
          echo "$APPLE_DIST_CERT_P12" | base64 --decode > "$RUNNER_TEMP/dist.p12"
          security import "$RUNNER_TEMP/dist.p12" \
            -k "$KEYCHAIN" \
            -P "$APPLE_DIST_CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -T /usr/bin/productbuild
          rm "$RUNNER_TEMP/dist.p12"

          # Authorize codesign to use the imported key without prompting.
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"

          # Sanity check: confirm the Distribution identity is visible.
          security find-identity -v -p codesigning "$KEYCHAIN"

      # `xcodebuild -allowProvisioningUpdates` uses the API key to
      # auto-fetch / refresh signing certs + provisioning profiles —
      # no manual cert + profile management in CI.
      - name: Archive
        if: steps.gate.outputs.skip == 'false'
        working-directory: ${{ env.IOS_PROJECT_DIR }}
        # Raw xcodebuild output (no `xcpretty || true`) — when archive fails
        # we need the real signing / provisioning error, not a swallowed exit.
        # CODE_SIGN_IDENTITY[sdk=iphoneos*]="Apple Distribution" is baked
        # into the Release configs of the xcodeproj for both targets, so
        # the CLI doesn't need to override it.
        #
        # CURRENT_PROJECT_VERSION (CFBundleVersion) is overridden to the
        # GitHub Actions run number — monotonically increasing per workflow
        # invocation, so every push to main produces a unique TestFlight
        # build number. Without this override, the pbxproj-baked value
        # (`= 1`) made every upload after the first one a duplicate, and
        # Apple's processing pipeline silently rejected them after
        # altool's UPLOAD SUCCEEDED — fixing required physicians can't
        # receive new bug-fix builds in TestFlight.
        run: |
          set -o pipefail
          xcodebuild -scheme "$IOS_SCHEME" \
                     -destination 'generic/platform=iOS' \
                     -configuration Release \
                     -archivePath "$RUNNER_TEMP/Aurion.xcarchive" \
                     -allowProvisioningUpdates \
                     -authenticationKeyPath "$HOME/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8" \
                     -authenticationKeyID "$APP_STORE_CONNECT_KEY_ID" \
                     -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
                     CURRENT_PROJECT_VERSION="${GITHUB_RUN_NUMBER}" \
                     archive

      - name: Export IPA
        if: steps.gate.outputs.skip == 'false'
        working-directory: ${{ env.IOS_PROJECT_DIR }}
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
                     -archivePath "$RUNNER_TEMP/Aurion.xcarchive" \
                     -exportPath "$RUNNER_TEMP/export" \
                     -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
                     -allowProvisioningUpdates \
                     -authenticationKeyPath "$HOME/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8" \
                     -authenticationKeyID "$APP_STORE_CONNECT_KEY_ID" \
                     -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID"

      - name: Upload to TestFlight
        if: steps.gate.outputs.skip == 'false'
        run: |
          IPA_PATH=$(find "$RUNNER_TEMP/export" -name "*.ipa" -type f | head -1)
          if [ -z "$IPA_PATH" ]; then
            echo "::error::No .ipa produced by export step"
            exit 1
          fi
          xcrun altool --upload-app \
                       --type ios \
                       --file "$IPA_PATH" \
                       --apiKey "$APP_STORE_CONNECT_KEY_ID" \
                       --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID"
