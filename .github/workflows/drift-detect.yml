# Terraform drift detection (dev) — #326.
#
# Runs `terraform plan -detailed-exitcode` against the dev state on a daily
# schedule (and on demand) and FAILS the run when the plan is non-empty, i.e.
# the deployed infra has diverged from `main`'s Terraform. This catches
# out-of-band/console changes early (the kind that surfaced as drift on
# aws_amplify_app.web_portal + aws_security_group.db on 2026-06-07) before a
# future `apply` silently reverts them.
#
# Read-only: plan only, never apply. The job pins api_image_tag to the
# CURRENTLY-DEPLOYED image so the image isn't reported as spurious drift
# (api_image_tag is now a required var — see variables.tf / #326).
name: Drift detection (dev)

on:
  schedule:
    - cron: "0 13 * * *" # 13:00 UTC daily (~08:00 ET)
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

jobs:
  drift:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ca-central-1
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_DEV }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"
          terraform_wrapper: false

      - name: Render backend config
        env:
          BOOTSTRAP_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
        run: |
          mkdir -p infrastructure/backends
          cat > infrastructure/backends/dev.s3.tfbackend <<EOF
          bucket         = "aurion-terraform-state-${BOOTSTRAP_ACCOUNT_ID}"
          dynamodb_table = "aurion-terraform-locks"
          key            = "aurion/dev/terraform.tfstate"
          region         = "ca-central-1"
          encrypt        = true
          kms_key_id     = "alias/aurion-terraform-state"
          EOF

      - name: Terraform init
        working-directory: infrastructure
        run: terraform init -reconfigure -backend-config=backends/dev.s3.tfbackend

      # Pin api_image_tag to the live deployed image so a normal CI deploy
      # isn't mistaken for drift (the tag legitimately moves each merge).
      - name: Resolve deployed image tag
        id: img
        run: |
          IMG=$(aws ecs describe-task-definition \
            --task-definition aurion-api-dev \
            --query 'taskDefinition.containerDefinitions[0].image' --output text)
          echo "tag=${IMG##*:}" >> "$GITHUB_OUTPUT"

      - name: Terraform plan (detailed exit code)
        id: plan
        working-directory: infrastructure
        # -detailed-exitcode: 0 = no changes, 1 = error, 2 = drift present.
        # Pass the tag via env (not inline ${{ }}) to avoid run-command
        # interpolation, even though it's an internal ECR tag.
        env:
          IMAGE_TAG: ${{ steps.img.outputs.tag }}
        run: |
          terraform plan -no-color -detailed-exitcode \
            -var-file=environments/dev.tfvars \
            -var "api_image_tag=$IMAGE_TAG"

      # If the plan step exited 2 (drift) the job already failed above; this
      # summary line makes the cause obvious in the run list.
      - name: Drift detected
        if: failure()
        run: |
          echo "::error::Terraform drift detected on dev — the deployed infra has diverged from main. Review the plan output above and reconcile (fold the intended change into Terraform, or revert the out-of-band change)." >&2
