name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check backend/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: cd backend && pip install -r requirements.txt
      - run: cd backend && pytest tests/unit/ -v --tb=short

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main'
    env:
      ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
      COMMIT_SHA: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ca-central-1
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr-login
      - run: |
          docker build -t aurion-api backend/
          docker tag aurion-api:latest "${ECR_REGISTRY}/aurion-api:latest"
          docker tag aurion-api:latest "${ECR_REGISTRY}/aurion-api:${COMMIT_SHA}"
          docker push "${ECR_REGISTRY}/aurion-api:latest"
          docker push "${ECR_REGISTRY}/aurion-api:${COMMIT_SHA}"
