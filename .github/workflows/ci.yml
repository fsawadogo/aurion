name: CI

# PRs run lint + test only.
# Pushes to main run lint + test, then build + push the image to ECR,
# then `terraform apply` against the dev environment with the new
# image tag. The dev environment auto-rolls.
#
# Prod deploys live in deploy-prod.yml (manual workflow_dispatch).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# OIDC requires id-token: write at the workflow or job level.
permissions:
  contents: read
  id-token: write

jobs:
  # ---------------------------------------------------------------------------
  # Lint — Python only. Swift lint runs in the iOS workflow.
  # ---------------------------------------------------------------------------
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check backend/

  # ---------------------------------------------------------------------------
  # Test — pytest unit tests against the in-process FastAPI app.
  # E2E tests (P0-07) need a real Postgres and run in a separate matrix.
  # ---------------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: cd backend && pip install -r requirements.txt
      - run: cd backend && pytest tests/unit/ -v --tb=short

  # ---------------------------------------------------------------------------
  # Build + Push — only on push to main. Tags with both SHA (immutable
  # reference for the deploy step) and `latest` (convenience pointer,
  # not what prod ever consumes).
  # ---------------------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main'
    outputs:
      image_tag: ${{ steps.tag.outputs.sha }}
    env:
      ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
      AWS_REGION: ca-central-1
    steps:
      - uses: actions/checkout@v4

      - name: Compute short SHA tag
        id: tag
        run: echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_DEV }}

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build + push image
        env:
          IMAGE_TAG: ${{ steps.tag.outputs.sha }}
        run: |
          docker build -t aurion-api backend/
          docker tag aurion-api:latest "${ECR_REGISTRY}/aurion-backend-dev:${IMAGE_TAG}"
          docker tag aurion-api:latest "${ECR_REGISTRY}/aurion-backend-dev:latest"
          docker push "${ECR_REGISTRY}/aurion-backend-dev:${IMAGE_TAG}"
          docker push "${ECR_REGISTRY}/aurion-backend-dev:latest"

  # ---------------------------------------------------------------------------
  # Deploy to dev — terraform apply with the SHA from the build job.
  # Dev auto-rolls. Prod has its own workflow with a human gate.
  # ---------------------------------------------------------------------------
  deploy-dev:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    env:
      AWS_REGION: ca-central-1
      TF_VAR_api_image_tag: ${{ needs.build.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_DEV }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"
          terraform_wrapper: false

      # The backends/dev.s3.tfbackend file is gitignored — regenerate
      # from the bootstrap-module outputs at CI time so we don't ship
      # the account ID in source.
      - name: Render backend config
        env:
          BOOTSTRAP_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
        run: |
          mkdir -p infrastructure/backends
          cat > infrastructure/backends/dev.s3.tfbackend <<EOF
          bucket         = "aurion-terraform-state-${BOOTSTRAP_ACCOUNT_ID}"
          dynamodb_table = "aurion-terraform-locks"
          key            = "aurion/dev/terraform.tfstate"
          region         = "ca-central-1"
          encrypt        = true
          kms_key_id     = "alias/aurion-terraform-state"
          EOF

      - name: Terraform init
        working-directory: infrastructure
        run: terraform init -reconfigure -backend-config=backends/dev.s3.tfbackend

      - name: Terraform apply
        working-directory: infrastructure
        run: terraform apply -auto-approve -var-file=environments/dev.tfvars
