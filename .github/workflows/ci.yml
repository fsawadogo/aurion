name: CI

# Backend CI/CD. Triggered ONLY by changes that can actually affect the
# backend deploy: backend/**, infrastructure/**, or this workflow file.
# iOS-only / docs-only / spreadsheet pushes don't fire this.
#
# PRs run lint + test only.
# Pushes to main run lint + test, then build + push the image to ECR,
# then `terraform plan` (printed to the run log for visibility) followed
# by `terraform apply` against dev with the SHA-pinned image tag.
#
# Prod deploys live in deploy-prod.yml (manual workflow_dispatch).

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "infrastructure/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - "infrastructure/**"
      - ".github/workflows/ci.yml"

# OIDC requires id-token: write at the workflow or job level.
permissions:
  contents: read
  id-token: write

jobs:
  # ---------------------------------------------------------------------------
  # Lint — Python only. Swift lint runs in the iOS workflow.
  # ---------------------------------------------------------------------------
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check backend/

  # ---------------------------------------------------------------------------
  # Test — pytest unit tests against the in-process FastAPI app.
  # E2E tests (P0-07) need a real Postgres and run in a separate matrix.
  # ---------------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: cd backend && pip install -r requirements.txt
      - run: cd backend && pytest tests/unit/ -v --tb=short

  # ---------------------------------------------------------------------------
  # Build + Push — only on push to main. Single SHA-tagged image; no
  # :latest pointer (the task definition pins to the SHA, so the pointer
  # would just drift). Layer cache via GHA backend halves typical build
  # time from ~60s → ~25s.
  # ---------------------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main'
    outputs:
      image_tag: ${{ steps.tag.outputs.sha }}
    env:
      ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
      AWS_REGION: ca-central-1
    steps:
      - uses: actions/checkout@v4

      - name: Compute short SHA tag
        id: tag
        run: echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_DEV }}

      - uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      - name: Build + push image
        uses: docker/build-push-action@v5
        with:
          context: backend
          push: true
          tags: ${{ env.ECR_REGISTRY }}/aurion-backend-dev:${{ steps.tag.outputs.sha }}
          # GHA cache backend — layers persist across runs in the
          # repo's Actions cache. mode=max stores every intermediate
          # layer (vs the default mode=min which only caches the
          # final stage).
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Deploy to dev — terraform plan (logged) → terraform apply with the
  # SHA from the build job. Dev auto-rolls. Prod has its own workflow
  # with a human gate.
  # ---------------------------------------------------------------------------
  deploy-dev:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    env:
      AWS_REGION: ca-central-1
      # Promoted to a shell variable for the apply step. `-var` on the
      # CLI overrides `-var-file=dev.tfvars` (Terraform precedence:
      # CLI flags > tfvars files > env), so we pass it explicitly
      # rather than relying on TF_VAR_ which DOES get overridden by
      # the tfvars file.
      IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_DEV }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"
          terraform_wrapper: false

      # The backends/dev.s3.tfbackend file is gitignored — regenerate
      # from the bootstrap-module outputs at CI time so we don't ship
      # the account ID in source.
      - name: Render backend config
        env:
          BOOTSTRAP_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
        run: |
          mkdir -p infrastructure/backends
          cat > infrastructure/backends/dev.s3.tfbackend <<EOF
          bucket         = "aurion-terraform-state-${BOOTSTRAP_ACCOUNT_ID}"
          dynamodb_table = "aurion-terraform-locks"
          key            = "aurion/dev/terraform.tfstate"
          region         = "ca-central-1"
          encrypt        = true
          kms_key_id     = "alias/aurion-terraform-state"
          EOF

      - name: Terraform init
        working-directory: infrastructure
        run: terraform init -reconfigure -backend-config=backends/dev.s3.tfbackend

      # Plan with -out saves the exact set of operations; apply
      # consumes the file so it's guaranteed to do precisely what
      # the run log shows. No-color keeps the log readable in the
      # GitHub Actions UI.
      - name: Terraform plan
        working-directory: infrastructure
        run: terraform plan -no-color -out=tfplan -var-file=environments/dev.tfvars -var "api_image_tag=$IMAGE_TAG"

      - name: Terraform apply
        working-directory: infrastructure
        run: terraform apply -auto-approve -no-color tfplan
