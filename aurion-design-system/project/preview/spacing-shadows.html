<!doctype html><html><head><meta charset="utf-8"><title>Shadows</title><link rel="stylesheet" href="_card.css"></head>
<body><div class="card" style="background:#F8F9FA;">
  <div class="caps">Elevation · Shadow tokens</div>
  <div class="row wrap" style="gap:18px;">
    <div class="col" style="align-items:center; gap:8px;">
      <div style="width:96px; height:64px; background:#FFFFFF; border-radius:14px; border:1px solid rgba(13,27,62,0.06);"></div>
      <div class="mono" style="font-size:11px;">sh-0 · flat</div>
    </div>
    <div class="col" style="align-items:center; gap:8px;">
      <div style="width:96px; height:64px; background:#FFFFFF; border-radius:14px; border:1px solid rgba(13,27,62,0.06); box-shadow:0 1px 2px rgba(13,27,62,0.04);"></div>
      <div class="mono" style="font-size:11px;">sh-1 · pressed</div>
    </div>
    <div class="col" style="align-items:center; gap:8px;">
      <div style="width:96px; height:64px; background:#FFFFFF; border-radius:14px; border:1px solid rgba(13,27,62,0.06); box-shadow:0 1px 2px rgba(13,27,62,0.04), 0 4px 16px rgba(13,27,62,0.06);"></div>
      <div class="mono" style="font-size:11px;">sh-2 · card</div>
    </div>
    <div class="col" style="align-items:center; gap:8px;">
      <div style="width:96px; height:64px; background:#FFFFFF; border-radius:14px; border:1px solid rgba(13,27,62,0.06); box-shadow:0 2px 4px rgba(13,27,62,0.06), 0 12px 32px rgba(13,27,62,0.10);"></div>
      <div class="mono" style="font-size:11px;">sh-3 · float</div>
    </div>
    <div class="col" style="align-items:center; gap:8px;">
      <div style="width:96px; height:64px; background:#C9A84C; border-radius:9999px; box-shadow:0 0 0 8px rgba(201,168,76,0.18), 0 12px 32px rgba(201,168,76,0.36);"></div>
      <div class="mono" style="font-size:11px;">sh-record-pulse</div>
    </div>
  </div>
</div></body></html>
