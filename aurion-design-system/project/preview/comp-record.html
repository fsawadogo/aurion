<!doctype html><html><head><meta charset="utf-8"><title>Record button</title><link rel="stylesheet" href="_card.css"></head>
<body><div class="card dark center" style="align-items:center;">
  <div class="caps" style="color:#8590AE;">Record button · 78pt · Gold halo · Pulse 1.6s</div>
  <div style="position:relative; width:120px; height:120px; display:flex; align-items:center; justify-content:center;">
    <div style="position:absolute; inset:0; border-radius:9999px; background:radial-gradient(circle, rgba(201,168,76,0.30) 0%, rgba(201,168,76,0) 60%); animation:pulse 1.6s ease-in-out infinite;"></div>
    <button style="width:78px; height:78px; border-radius:9999px; background:#C9A84C; border:none; box-shadow:0 0 0 8px rgba(201,168,76,0.18), 0 12px 32px rgba(201,168,76,0.36); cursor:pointer; display:flex; align-items:center; justify-content:center;">
      <span style="width:30px; height:30px; background:#0D1B3E; border-radius:6px;"></span>
    </button>
  </div>
  <style>@keyframes pulse { 0%, 100% { transform:scale(1); opacity:0.9; } 50% { transform:scale(1.18); opacity:0.4; } }</style>
</div></body></html>
