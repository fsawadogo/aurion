<!doctype html><html><head><meta charset="utf-8"><title>Buttons</title><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="caps">Buttons · Primary, secondary, tertiary, destructive</div>
  <div class="row wrap" style="gap:10px;">
    <button style="background:#C9A84C; color:#0D1B3E; border:none; padding:14px 22px; border-radius:12px; font-weight:600; font-size:16px; box-shadow:0 1px 2px rgba(13,27,62,0.04), 0 4px 16px rgba(201,168,76,0.24); cursor:pointer;">Start Session</button>
    <button style="background:#FFFFFF; color:#0D1B3E; border:1px solid rgba(13,27,62,0.18); padding:14px 22px; border-radius:12px; font-weight:600; font-size:16px; cursor:pointer;">Save for Later</button>
    <button style="background:transparent; color:#0D1B3E; border:none; padding:14px 14px; font-weight:500; font-size:16px; cursor:pointer;">Skip Context</button>
    <button style="background:#FFFFFF; color:#D9352B; border:1px solid rgba(217,53,43,0.30); padding:14px 22px; border-radius:12px; font-weight:600; font-size:16px; cursor:pointer;">Discard</button>
  </div>
  <div class="row wrap" style="gap:10px;">
    <button style="background:#C9A84C; color:#0D1B3E; border:none; padding:10px 16px; border-radius:10px; font-weight:600; font-size:14px;">Continue</button>
    <button style="background:rgba(13,27,62,0.06); color:#0D1B3E; border:none; padding:10px 16px; border-radius:10px; font-weight:600; font-size:14px;">Back</button>
    <button style="background:#C9A84C; color:#0D1B3E; border:none; padding:6px 14px; border-radius:9999px; font-weight:600; font-size:13px;">Resume</button>
    <button disabled style="background:#C9A84C; color:#0D1B3E; border:none; padding:14px 22px; border-radius:12px; font-weight:600; font-size:16px; opacity:0.4;">Disabled</button>
  </div>
</div></body></html>
