<!doctype html><html><head><meta charset="utf-8"><title>Voice</title><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="caps">Voice · examples</div>
  <div class="col" style="gap:6px;">
    <div style="display:grid; grid-template-columns:auto 1fr 1fr; gap:10px; align-items:center; font-size:13px;">
      <span class="caps" style="font-size:10px;">Greet</span>
      <span style="color:#1F7A4F;">✓ Good morning, Dr. Chen</span>
      <span style="color:#9AA0AC; text-decoration:line-through;">Hey Sarah! 👋</span>
    </div>
    <div style="display:grid; grid-template-columns:auto 1fr 1fr; gap:10px; align-items:center; font-size:13px;">
      <span class="caps" style="font-size:10px;">Empty</span>
      <span style="color:#1F7A4F;">✓ No pending reviews</span>
      <span style="color:#9AA0AC; text-decoration:line-through;">All caught up! 🎉</span>
    </div>
    <div style="display:grid; grid-template-columns:auto 1fr 1fr; gap:10px; align-items:center; font-size:13px;">
      <span class="caps" style="font-size:10px;">CTA</span>
      <span style="color:#1F7A4F;">✓ Approve &amp; Sign</span>
      <span style="color:#9AA0AC; text-decoration:line-through;">Submit</span>
    </div>
    <div style="display:grid; grid-template-columns:auto 1fr 1fr; gap:10px; align-items:center; font-size:13px;">
      <span class="caps" style="font-size:10px;">Error</span>
      <span style="color:#1F7A4F;">✓ Recording paused. Tap to resume.</span>
      <span style="color:#9AA0AC; text-decoration:line-through;">Oops, something broke!</span>
    </div>
    <div style="display:grid; grid-template-columns:auto 1fr 1fr; gap:10px; align-items:center; font-size:13px;">
      <span class="caps" style="font-size:10px;">Success</span>
      <span style="color:#1F7A4F;">✓ Note ready</span>
      <span style="color:#9AA0AC; text-decoration:line-through;">Your note has been generated!</span>
    </div>
  </div>
</div></body></html>
