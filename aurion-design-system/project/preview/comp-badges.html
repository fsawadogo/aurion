<!doctype html><html><head><meta charset="utf-8"><title>Status Badges</title><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="caps">Status badges · Pill · 11/600 · 0.04em</div>
  <div class="row wrap" style="gap:8px;">
    <span style="display:inline-flex; align-items:center; gap:6px; padding:4px 10px; background:#E6F5EE; color:#1F7A4F; border-radius:9999px; font-size:11px; font-weight:600; letter-spacing:0.04em;"><span style="width:6px; height:6px; background:#2E9E6A; border-radius:999px;"></span>Completed</span>
    <span style="display:inline-flex; align-items:center; gap:6px; padding:4px 10px; background:#FBF6E6; color:#8E7330; border-radius:9999px; font-size:11px; font-weight:600; letter-spacing:0.04em;"><span style="width:6px; height:6px; background:#C9A84C; border-radius:999px;"></span>Pending</span>
    <span style="display:inline-flex; align-items:center; gap:6px; padding:4px 10px; background:#D9352B; color:#FFFFFF; border-radius:9999px; font-size:11px; font-weight:700; letter-spacing:0.10em;"><span style="width:6px; height:6px; background:#FFFFFF; border-radius:999px;"></span>REC</span>
    <span style="display:inline-flex; align-items:center; gap:6px; padding:4px 10px; background:#EEF0F3; color:#4A5160; border-radius:9999px; font-size:11px; font-weight:600; letter-spacing:0.04em;"><span style="width:6px; height:6px; background:#9AA0AC; border-radius:999px;"></span>Archived</span>
    <span style="display:inline-flex; align-items:center; gap:6px; padding:4px 10px; background:#E6EEFA; color:#214E9C; border-radius:9999px; font-size:11px; font-weight:600; letter-spacing:0.04em;"><span style="width:6px; height:6px; background:#2D6CDF; border-radius:999px;"></span>Exported</span>
    <span style="display:inline-flex; align-items:center; gap:6px; padding:4px 10px; background:#FBF1DC; color:#9A6E14; border-radius:9999px; font-size:11px; font-weight:600; letter-spacing:0.04em;"><span style="width:6px; height:6px; background:#D9941F; border-radius:999px;"></span>Conflict</span>
  </div>
  <div style="margin-top:8px; font-size:13px; color:#6B7280;">Pills follow content width — never fixed. Padding: 4×10. Always paired with a 6×6 status dot when status is the primary information.</div>
</div></body></html>
