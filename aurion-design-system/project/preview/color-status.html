<!doctype html><html><head><meta charset="utf-8"><title>Status Colors</title><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="caps">Semantic · Status badges</div>
  <div class="row wrap" style="gap:10px;">
    <div class="col" style="background:#FFFFFF; padding:14px 16px; border-radius:14px; border:1px solid rgba(13,27,62,0.06); flex:1; min-width:120px;">
      <div class="row"><span style="display:inline-block; width:10px; height:10px; background:#2E9E6A; border-radius:999px;"></span><span class="caps" style="font-size:11px; letter-spacing:.08em; color:#2E9E6A;">Done</span></div>
      <div class="mono" style="font-size:11px; color:#6B7280;">#2E9E6A</div>
      <span style="display:inline-block; padding:3px 10px; background:#E6F5EE; color:#1F7A4F; border-radius:999px; font-size:11px; font-weight:600; letter-spacing:0.04em; align-self:flex-start;">Completed</span>
    </div>
    <div class="col" style="background:#FFFFFF; padding:14px 16px; border-radius:14px; border:1px solid rgba(13,27,62,0.06); flex:1; min-width:120px;">
      <div class="row"><span style="display:inline-block; width:10px; height:10px; background:#C9A84C; border-radius:999px;"></span><span class="caps" style="font-size:11px; letter-spacing:.08em; color:#8E7330;">Pending</span></div>
      <div class="mono" style="font-size:11px; color:#6B7280;">#C9A84C</div>
      <span style="display:inline-block; padding:3px 10px; background:#FBF6E6; color:#8E7330; border-radius:999px; font-size:11px; font-weight:600; letter-spacing:0.04em; align-self:flex-start;">Pending</span>
    </div>
    <div class="col" style="background:#FFFFFF; padding:14px 16px; border-radius:14px; border:1px solid rgba(13,27,62,0.06); flex:1; min-width:120px;">
      <div class="row"><span style="display:inline-block; width:10px; height:10px; background:#D9352B; border-radius:999px;"></span><span class="caps" style="font-size:11px; letter-spacing:.08em; color:#D9352B;">Recording</span></div>
      <div class="mono" style="font-size:11px; color:#6B7280;">#D9352B</div>
      <span style="display:inline-block; padding:3px 10px; background:#D9352B; color:#FFFFFF; border-radius:999px; font-size:11px; font-weight:700; letter-spacing:0.10em; align-self:flex-start;">REC</span>
    </div>
    <div class="col" style="background:#FFFFFF; padding:14px 16px; border-radius:14px; border:1px solid rgba(13,27,62,0.06); flex:1; min-width:120px;">
      <div class="row"><span style="display:inline-block; width:10px; height:10px; background:#9AA0AC; border-radius:999px;"></span><span class="caps" style="font-size:11px; letter-spacing:.08em; color:#6B7280;">Archived</span></div>
      <div class="mono" style="font-size:11px; color:#6B7280;">#9AA0AC</div>
      <span style="display:inline-block; padding:3px 10px; background:#EEF0F3; color:#4A5160; border-radius:999px; font-size:11px; font-weight:600; letter-spacing:0.04em; align-self:flex-start;">Archived</span>
    </div>
    <div class="col" style="background:#FFFFFF; padding:14px 16px; border-radius:14px; border:1px solid rgba(13,27,62,0.06); flex:1; min-width:120px;">
      <div class="row"><span style="display:inline-block; width:10px; height:10px; background:#D9941F; border-radius:999px;"></span><span class="caps" style="font-size:11px; letter-spacing:.08em; color:#D9941F;">Conflict</span></div>
      <div class="mono" style="font-size:11px; color:#6B7280;">#D9941F</div>
      <span style="display:inline-block; padding:3px 10px; background:#FBF1DC; color:#9A6E14; border-radius:999px; font-size:11px; font-weight:600; letter-spacing:0.04em; align-self:flex-start;">Review</span>
    </div>
  </div>
</div></body></html>
