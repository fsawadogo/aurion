<!doctype html><html><head><meta charset="utf-8"><title>Form Inputs</title><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="caps">Inputs · Text field, multiline, radio, checkbox</div>
  <div class="row" style="gap:14px; align-items:flex-start;">
    <div class="col" style="flex:1; gap:8px;">
      <label style="font-size:13px; font-weight:500; color:#6B7280;">Email</label>
      <input value="dr.chen@aurion.health" style="padding:12px 14px; border-radius:10px; border:1px solid rgba(13,27,62,0.18); background:#FFFFFF; font-size:15px; font-family:inherit; color:#0D1B3E;">
      <label style="font-size:13px; font-weight:500; color:#6B7280; margin-top:6px;">Patient context</label>
      <textarea style="padding:12px 14px; border-radius:10px; border:1px solid #C9A84C; outline:2px solid rgba(201,168,76,0.30); background:#FFFFFF; font-size:15px; font-family:inherit; color:#0D1B3E; resize:none; height:54px;">Right knee pain, 3 weeks post-op</textarea>
    </div>
    <div class="col" style="flex:1; gap:6px;">
      <div style="display:flex; align-items:center; gap:10px; padding:10px 12px; background:#FFFFFF; border-radius:10px; border:1px solid rgba(13,27,62,0.10);">
        <span style="width:18px; height:18px; border-radius:9999px; border:2px solid #C9A84C; display:inline-flex; align-items:center; justify-content:center;"><span style="width:8px; height:8px; background:#C9A84C; border-radius:9999px;"></span></span>
        <span style="font-size:15px; color:#0D1B3E;">Orthopedic Surgery</span>
      </div>
      <div style="display:flex; align-items:center; gap:10px; padding:10px 12px; background:#FFFFFF; border-radius:10px; border:1px solid rgba(13,27,62,0.10);">
        <span style="width:18px; height:18px; border-radius:9999px; border:2px solid #C6CAD2;"></span>
        <span style="font-size:15px; color:#0D1B3E;">Plastic Surgery</span>
      </div>
      <div style="display:flex; align-items:center; gap:10px; padding:10px 12px; background:#FFFFFF; border-radius:10px; border:1px solid rgba(13,27,62,0.10);">
        <span style="width:18px; height:18px; border-radius:6px; background:#C9A84C; display:inline-flex; align-items:center; justify-content:center;"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#0D1B3E" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>
        <span style="font-size:15px; color:#0D1B3E;">New Patient</span>
      </div>
    </div>
  </div>
</div></body></html>
