<!doctype html><html><head><meta charset="utf-8"><title>Gold Ramp</title><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="caps">Gold · Accent — earns attention; never decorative</div>
  <div class="row" style="gap:8px;">
    <div class="col" style="flex:1;">
      <div class="swatch" style="background:#FBF6E6; height:64px;"></div>
      <div class="caps">50</div>
      <div class="mono" style="font-size:11px; color:#6B7280;">#FBF6E6</div>
    </div>
    <div class="col" style="flex:1;">
      <div class="swatch" style="background:#F2E5B3; height:64px;"></div>
      <div class="caps">100</div>
      <div class="mono" style="font-size:11px; color:#6B7280;">#F2E5B3</div>
    </div>
    <div class="col" style="flex:1;">
      <div class="swatch" style="background:#E5D082; height:64px;"></div>
      <div class="caps">200</div>
      <div class="mono" style="font-size:11px; color:#6B7280;">#E5D082</div>
    </div>
    <div class="col" style="flex:1;">
      <div class="swatch" style="background:#D7BB5F; height:64px;"></div>
      <div class="caps">300</div>
      <div class="mono" style="font-size:11px; color:#6B7280;">#D7BB5F</div>
    </div>
    <div class="col" style="flex:1;">
      <div class="swatch" style="background:#C9A84C; height:64px; border:1px solid #0D1B3E;"></div>
      <div class="caps" style="color:#FFFFFF; background:#0D1B3E; padding:2px 6px; border-radius:4px; align-self:flex-start;">400 · brand</div>
      <div class="mono" style="font-size:11px; color:#6B7280;">#C9A84C</div>
    </div>
    <div class="col" style="flex:1;">
      <div class="swatch" style="background:#B5953D; height:64px;"></div>
      <div class="caps">500</div>
      <div class="mono" style="font-size:11px; color:#6B7280;">#B5953D</div>
    </div>
    <div class="col" style="flex:1;">
      <div class="swatch" style="background:#8E7330; height:64px;"></div>
      <div class="caps">600</div>
      <div class="mono" style="font-size:11px; color:#6B7280;">#8E7330</div>
    </div>
    <div class="col" style="flex:1;">
      <div class="swatch" style="background:#5C4A1F; height:64px;"></div>
      <div class="caps" style="color:#FFFFFF; background:#5C4A1F; padding:2px 6px; border-radius:4px; align-self:flex-start;">700</div>
      <div class="mono" style="font-size:11px; color:#6B7280;">#5C4A1F</div>
    </div>
  </div>
</div></body></html>
