<!doctype html><html><head><meta charset="utf-8"><title>Note Section Colors</title><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="caps">Note Sections · Left-border colors in note review</div>
  <div class="col" style="gap:8px;">
    <div style="background:#FFFFFF; padding:12px 14px; border-radius:10px; border-left:3px solid #2D6CDF; display:flex; justify-content:space-between; align-items:center;">
      <div><div style="font-weight:600; font-size:14px;">Patient Information</div><div style="color:#6B7280; font-size:12px;">Demographics, history, presenting concern</div></div>
      <div class="mono" style="font-size:11px; color:#2D6CDF;">#2D6CDF</div>
    </div>
    <div style="background:#FFFFFF; padding:12px 14px; border-radius:10px; border-left:3px solid #2E9E6A; display:flex; justify-content:space-between; align-items:center;">
      <div><div style="font-weight:600; font-size:14px;">Examination</div><div style="color:#6B7280; font-size:12px;">Physical findings, measurements</div></div>
      <div class="mono" style="font-size:11px; color:#2E9E6A;">#2E9E6A</div>
    </div>
    <div style="background:#FFFFFF; padding:12px 14px; border-radius:10px; border-left:3px solid #D9941F; display:flex; justify-content:space-between; align-items:center;">
      <div><div style="font-weight:600; font-size:14px;">Assessment</div><div style="color:#6B7280; font-size:12px;">Differential, diagnosis</div></div>
      <div class="mono" style="font-size:11px; color:#D9941F;">#D9941F</div>
    </div>
    <div style="background:#FFFFFF; padding:12px 14px; border-radius:10px; border-left:3px solid #0D1B3E; display:flex; justify-content:space-between; align-items:center;">
      <div><div style="font-weight:600; font-size:14px;">Plan</div><div style="color:#6B7280; font-size:12px;">Treatment, follow-up, prescriptions</div></div>
      <div class="mono" style="font-size:11px; color:#0D1B3E;">#0D1B3E</div>
    </div>
  </div>
</div></body></html>
