# Alembic Configuration File
#
# Database URL is read from the DATABASE_URL environment variable at runtime
# (see alembic/env.py). The placeholder below is overridden programmatically.

[alembic]
script_location = alembic
prepend_sys_path = .

# Template used to generate migration files.
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(rev)s_%%(slug)s

# Timezone for revision file timestamps.
timezone = UTC

# SQL output encoding.
output_encoding = utf-8

# The sqlalchemy.url value is set programmatically in env.py from DATABASE_URL.
# This placeholder is here only because Alembic requires the key to exist.
sqlalchemy.url = driver://user:pass@localhost/dbname

[post_write_hooks]
# Uncomment to run ruff after generating a migration:
# hooks = ruff
# ruff.type = exec
# ruff.executable = ruff
# ruff.options = check --fix REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
