[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
python_files = "test_*.py"
python_classes = "Test*"
python_functions = "test_*"
markers = [
    "e2e: end-to-end smoke tests against the live FastAPI router + Postgres",
]

[tool.ruff]
target-version = "py311"
# 120 is the modern pragmatic line length — readable on wide screens
# without forcing tortured line breaks on long log messages with
# session_id + error context (the bulk of the prior E501 hits).
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = [
    # `logger.error("... %s ...", session_id, err)` lines occasionally
    # still cross 120 chars after the bump. The legibility benefit of
    # those lines staying single is real; the readability cost of
    # 120+ chars is low at modern editor widths. If we want strict
    # adherence later, remove this ignore and reformat the offenders.
    "E501",
]
