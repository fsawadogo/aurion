    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      const C = '[data-composition-id="scene-6-approve"]';
      tl.fromTo(C+' .s6-bg', { opacity: 0 }, { opacity: 1, duration: 0.6, ease: 'power2.out' }, 0);
      tl.fromTo(C+' .phone', { opacity: 0 }, { opacity: 1, duration: 0.7, ease: 'power2.out' }, 0.05);
      tl.fromTo(C+' .s6-caption-tag', { y: 18, opacity: 0 }, { y: 0, opacity: 1, duration: 0.55, ease: 'power3.out' }, 0.25);
      tl.fromTo(C+' .s6-caption-line', { y: 22, opacity: 0 }, { y: 0, opacity: 1, duration: 0.7, ease: 'expo.out' }, 0.4);
      tl.fromTo(C+' .s6-foot', { y: 14, opacity: 0 }, { y: 0, opacity: 1, duration: 0.55, ease: 'power3.out' }, 0.6);
      // Sheet slides up from bottom (iOS modal pattern)
      tl.fromTo(C+' .sheet', { y: 1480, opacity: 1 }, { y: 0, duration: 0.7, ease: 'power3.out' }, 0.6);
      // Ring fill 0 → 100% (540.4 stroke length)
      tl.fromTo(C+' .big-ring', { strokeDashoffset: 540.4 }, { strokeDashoffset: 0, duration: 1.6, ease: 'power2.inOut' }, 1.4);
      // Number ticks 0 → 100
      const ticks = [0, 18, 36, 52, 68, 80, 88, 94, 98, 100];
      ticks.forEach((v, i) => { tl.set(C+' #s6-pct', { textContent: String(v) }, 1.4 + i * 0.16); });
      // Checks stagger
      tl.fromTo(C+' .check-row', { x: -10, opacity: 0 }, { x: 0, opacity: 1, duration: 0.4, stagger: 0.18, ease: 'power2.out' }, 3.2);
      // Approve button press effect
      tl.fromTo(C+' .sheet-button', { scale: 0.96, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.5, ease: 'power3.out' }, 4.0);
      tl.to(C+' .sheet-button', { scale: 0.97, duration: 0.16, yoyo: true, repeat: 1, ease: 'power2.inOut' }, 5.0);
      // Sheet slides down + toast slides up
      tl.to(C+' .sheet', { y: 200, opacity: 0, duration: 0.5, ease: 'power3.in' }, 5.4);
      tl.fromTo(C+' .purge-toast', { y: 80, opacity: 0 }, { y: 0, opacity: 1, duration: 0.5, ease: 'power3.out' }, 5.7);
      tl.fromTo(C+' .toast-row', { x: -10, opacity: 0 }, { x: 0, opacity: 1, duration: 0.35, stagger: 0.18, ease: 'power2.out' }, 5.9);
      window.__timelines["scene-6-approve"] = tl;
    </script>
